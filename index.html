<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bunyodkor KPI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .name { font-size: 17px; font-weight: bold; color: #0088cc; border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 10px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 14px; }
        .label { color: #666; }
        .val { font-weight: 600; color: #333; }
        .oylik-box { background: #e8f5e9; border-radius: 8px; padding: 10px; margin-top: 10px; text-align: center; border: 1px solid #c8e6c9; }
        .oylik-summa { color: #2e7d32; font-size: 18px; font-weight: bold; }
        .loader { text-align: center; margin-top: 50px; color: #0088cc; }
    </style>
</head>
<body>
    <div id="loader" class="loader">Ma'lumotlar yuklanmoqda...</div>
    <div id="app"></div>

    <script>
        // SIZNING YANGI LINKINGIZ
        const API_URL = "https://script.google.com/macros/s/AKfycbz2Uan0Cl76AJmcwDmQsdo2687c4OLwLb5LC_M4TOO7G28fQ8pywLsteJrEbtdviMlA9g/exec";

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const container = document.getElementById('app');
                
                let html = "";
                data.forEach(item => {
                    // Raqamlarni formatlash: 1000000 -> 1 000 000
                    const fmt = (n) => Number(n).toLocaleString('uz-UZ').replace(/,/g, ' ');
                    
                    html += `
                        <div class="card">
                            <div class="name">👤 ${item.ism}</div>
                            <div class="row"><span class="label">Smena:</span> <span class="val">${item.smena}</span></div>
                            <div class="row"><span class="label">KPI:</span> <span class="val">${fmt(item.kpi)}</span></div>
                            <div class="row"><span class="label">Jami savdo:</span> <span class="val">${fmt(item.savdo)} so'm</span></div>
                            <div class="oylik-box">
                                <div style="font-size: 12px; color: #444;">Kutilayotgan oylik:</div>
                                <div class="oylik-summa">${fmt(item.oylik)} so'm</div>
                            </div>
                        </div>
                    `;
                });
                
                container.innerHTML = html;
                document.getElementById('loader').style.display = 'none';
            } catch (e) {
                document.getElementById('loader').innerHTML = "Xatolik yuz berdi. Internetni tekshiring.";
            }
        }

        loadData();
        if(window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }
    </script>
</body>
</html>
