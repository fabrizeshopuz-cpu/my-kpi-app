<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI Monitor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 15px; margin: 0; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid #0088cc; }
        .name { font-size: 18px; font-weight: bold; color: #1c1e21; margin-bottom: 8px; display: block; }
        .item { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; border-bottom: 1px dashed #eee; padding-bottom: 3px; }
        .label { color: #606770; }
        .value { font-weight: 600; color: #2c3e50; }
        .total { background: #e7f3ff; padding: 8px; border-radius: 8px; margin-top: 10px; text-align: center; }
        .total-val { color: #27ae60; font-size: 18px; font-weight: bold; }
        .error { color: red; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="app">Ma'lumotlar yuklanmoqda...</div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyynY9BElbseZg8egbkXO0hxZLD00Xss4tfOA6B-V-sH6bbxs4YKU3jQwK5veHlyOFxdA/exec";

        async function load() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const app = document.getElementById('app');
                
                if (data.length === 0) {
                    app.innerHTML = "Jadvalda ma'lumot topilmadi.";
                    return;
                }

                let html = "";
                data.forEach(x => {
                    // Raqamlarni formatlash funksiyasi
                    const f = (val) => isNaN(val) ? val : Number(val).toLocaleString('uz-UZ');

                    html += `
                        <div class="card">
                            <span class="name">👤 ${x.ism || 'Noma\'lum'}</span>
                            <div class="item"><span class="label">Smena:</span> <span class="value">${x.smena || '-'}</span></div>
                            <div class="item"><span class="label">Savdo:</span> <span class="value">${f(x.savdo)} so'm</span></div>
                            <div class="item"><span class="label">KPI:</span> <span class="value">${f(x.kpi)}</span></div>
                            <div class="total">
                                <div style="font-size: 12px; color: #606770;">Kutilayotgan Oylik:</div>
                                <div class="total-val">${f(x.oylik)} so'm</div>
                            </div>
                        </div>
                    `;
                });
                app.innerHTML = html;
            } catch (err) {
                document.getElementById('app').innerHTML = `<div class="error">Xatolik: Ma'lumotni o'qib bo'lmadi.<br>${err}</div>`;
            }
        }
        load();
        if(window.Telegram && window.Telegram.WebApp) window.Telegram.WebApp.expand();
    </script>
</body>
</html>
